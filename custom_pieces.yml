# ==============================
# Custom Piece Definitions
# ------------------------------
# - user_char: The character used in FEN strings. (Use quotes if only numbers)
# - long_name: Display name of the piece.
# - colour: "white", "black", or "neutral".
# - type: The piece type (pawn, rook, etc.) for logic
# - base_type: Piece to use as base for image and rotation.
# - rotation: Rotation of the image in degrees (clockwise).
# - mirror: Mirroring of piece, likely before rotation (true/false).
# ==============================
NeutralBishop:
  user_char: '=b' # The character used in FEN strings
  long_name: Neutral Bishop  # Display name of the piece
  colour: neutral  # white, black, or neutral
  type: bishop  # The piece type (pawn, bishop, knight, rook, queen or king)
  rotation: 0  # (Optional) Rotation of the image in degrees
  # base_type: queen  # (Optional) Piece to use as base for image and rotation
  # mirror: false  # (Optional) Mirror (horizontal flip) of the image

