# ==============================
# Custom Piece Definitions
# ------------------------------
# - user_char: The character used in FEN strings. (Use quotes if only numbers)
# - long_name: Display name of the piece.
# - colour: "white", "black", or "neutral".
# - type: The piece type (pawn, rook, etc.) for logic
# - base_type: Piece to use as base for image and rotation.
# - rotation: Rotation of the image in degrees (clockwise).
# ==============================
WhiteMoa:
  user_char: '.MO'
  long_name: White Moa
  colour: white
  type: knight
  rotation: 90 # Do I also need to flip it to face upwards?

BlackMoa:
  user_char: '.mo'
  long_name: Black Moa
  colour: black
  type: knight
  rotation: 90 # Do I also need to flip it to face upwards?

WhiteMao:
  user_char: '.MA'
  long_name: White Mao
  colour: white
  type: knight
  rotation: 270
  mirror: true

BlackMao:
  user_char: '.ma'
  long_name: Black Mao
  colour: black
  type: knight
  rotation: 270
  mirror: true

WhiteRose:
  user_char: '.RO'
  long_name: White Rose
  colour: white
  type: knight
  rotation: 270

BlackRose:
  user_char: '.ro'
  long_name: Black Rose
  colour: black
  type: knight
  rotation: 270


NeutralBishop:
  user_char: '=b' # The character used in FEN strings
  long_name: Neutral Bishop  # Display name of the piece
  colour: neutral  # white, black, or neutral
  type: bishop  # The piece type (pawn, bishop, knight, rook, queen or king)
  rotation: 0  # (Optional) Rotation of the image in degrees
  # mirror: false # (Optional) Mirror piece before rotation?
  # base_type: queen  # (Optional) Piece to use as base for image and rotation

NeutralPawn:
  user_char: =p
  long_name: Neutral Pawn
  colour: neutral
  type: pawn
  rotation: 0

NeutralRook:
  user_char: =r
  long_name: Neutral Rook
  colour: neutral
  type: rook
  rotation: 0

NeutralQueen:
  user_char: =q
  long_name: Neutral Queen
  colour: neutral
  type: queen
  rotation: 0

NeutralKing:
  user_char: =k
  long_name: Neutral King
  colour: neutral
  type: king
  rotation: 0

NeutralKnight:
  user_char: =s
  long_name: Neutral Knight
  colour: neutral
  type: knight
  rotation: 0

BlackGrasshopper:
  user_char: g
  long_name: Grasshopper
  colour: black
