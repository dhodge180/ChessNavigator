# ==============================
# Custom Piece Definitions
# ------------------------------
# - user_char: The character used in FEN strings. (Use quotes if only numbers)
# - long_name: Display name of the piece.
# - colour: "white", "black", or "neutral".
# - type: The piece type (pawn, rook, etc.) for logic
# - base_type: Piece to use as base for image and rotation.
# - rotation: Rotation of the image in degrees (clockwise).
# ==============================
Weird:
  user_char: '.zz'
  long_name: Odd Piece
  colour: black
  type: bishop
  base_type: knight
  rotation: 270
WeirdW:
  user_char: '.ZZ'
  long_name: Odd Piece W
  colour: white
  type: bishop
  base_type: knight
  rotation: -90

NeutralBishop:
  user_char: '=b' # The character used in FEN strings
  long_name: Neutral Bishop  # Display name of the piece
  colour: neutral  # white, black, or neutral
  type: bishop  # The piece type (pawn, bishop, knight, rook, queen or king)
  rotation: 0  # (Optional) Rotation of the image in degrees
  # base_type: queen  # (Optional) Piece to use as base for image and rotation

NeutralPawn:
  user_char: =p
  long_name: Neutral Pawn
  colour: neutral
  type: pawn
  rotation: 0

NeutralRook:
  user_char: =r
  long_name: Neutral Rook
  colour: neutral
  type: rook
  rotation: 0

NeutralQueen:
  user_char: =q
  long_name: Neutral Queen
  colour: neutral
  type: queen
  rotation: 0

NeutralKing:
  user_char: =k
  long_name: Neutral King
  colour: neutral
  type: king
  rotation: 0

NeutralKnight:
  user_char: =s
  long_name: Neutral Knight
  colour: neutral
  type: knight
  rotation: 0

BlackGrasshopper:
  user_char: g
  long_name: Grasshopper
  colour: black
  type: grasshopper
  base_type: queen
  rotation: 180

WhiteGrasshopper:
  user_char: G
  long_name: Grasshopper
  colour: white
  type: grasshopper
  base_type: queen
  rotation: 180

WhiteNKnight:
  user_char: N
  long_name: White Knight
  colour: white
  type: knight
  rotation: 0

BlackNKnight:
  user_char: n
  long_name: Black Knight
  colour: black
  type: knight
  rotation: 0

